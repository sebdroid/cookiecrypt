name: Go
permissions:
    contents: read
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - name: Build
              run: go build -v ./...
            - name: Vet
              run: go vet ./...
            - name: Test
              run: go test -race -cover ./...
            - name: Lint
              uses: golangci/golangci-lint-action@v9
            - name: Vulncheck
              uses: golang/govulncheck-action@v1
              with:
                  go-version-file: go.mod
                  repo-checkout: false

    latest-caddy:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: go.mod
            - name: Upgrade to latest Caddy
              run: go get github.com/caddyserver/caddy/v2@latest && go mod tidy
            - name: Test
              run: go test -race ./...
